<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to AwayHome</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
    }
    body {
        background-color: #0d1117;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    .role-card-container {
        text-align: center;
        max-width: 800px;
        width: 100%;
    }
    .role-title {
        color: #ffffff;
        font-size: 2.5rem;
        margin-bottom: 8px;
        font-weight: 700;
    }
    .role-title span {
        color: #58a6ff;
    }
    .role-subtitle {
        color: #8b949e;
        font-size: 1.1rem;
        margin-bottom: 40px;
    }
    .role-options {
        display: flex;
        gap: 24px;
        justify-content: center;
    }
    .role-card {
        background-color: #161b22;
        border: 1px solid #30363d;
        border-radius: 12px;
        padding: 30px 24px;
        flex: 1;
        max-width: 340px;
        text-decoration: none;
        transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .role-card:hover {
        transform: translateY(-5px);
        border-color: #58a6ff;
        box-shadow: 0 8px 24px rgba(88, 166, 255, 0.1);
    }
    .role-icon {
        font-size: 3rem;
        margin-bottom: 16px;
    }
    .role-card h3 {
        color: #ffffff;
        font-size: 1.3rem;
        margin-bottom: 12px;
    }
    .role-card p {
        color: #8b949e;
        font-size: 0.9rem;
        line-height: 1.5;
        margin-bottom: 24px;
        text-align: center;
        flex-grow: 1;
    }
    .role-btn {
        width: 100%;
        padding: 12px;
        font-weight: 600;
        border-radius: 6px;
        border: none;
        text-align: center;
        font-size: 0.9rem;
        cursor: pointer;
    }
    .btn-primary { background-color: #1f6feb; color: #ffffff; }
    .btn-secondary { background-color: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
    
    @media (max-width: 600px) {
        .role-options { flex-direction: column; align-items: center; }
        .role-card { width: 100%; }
        .role-title { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <div class="role-card-container">
    <h1 class="role-title">Welcome to Away<span>Home</span></h1>
    <p class="role-subtitle"></p>
    
    <div class="role-options">
      <a href="index.html" class="role-card">
        <div class="role-icon">🔍</div>
        <h3>Find a Stay</h3>
        <p>Explore and book available PGs, flats, or homestays across Tripura.</p>
        <button class="role-btn btn-primary">Explore Stays</button>
      </a>

      <a href="owner.html" class="role-card">
        <div class="role-icon">🏠</div>
        <h3>Become an Owner</h3>
        <p>List your property, manage your settings, and launch your dashboard.</p>
        <button class="role-btn btn-secondary">Host Property</button>
      </a>
    </div>
  </div>

</body>
</html>
